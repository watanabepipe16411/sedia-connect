<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セディア・コネクト</title>

<style>
body{
margin:0;
font-family: "Helvetica Neue", Arial, sans-serif;
color:#333;
}

/* ===== メインカラー ===== */
:root{
--cyan100:#00AEEF;
--cyan70:#6FD3F7;
--cyan30:#E6F7FD;
}

/* ===== HERO ===== */
.hero{
background:linear-gradient(135deg,var(--cyan70),var(--cyan100));
color:#fff;
padding:100px 20px 140px;
text-align:center;
position:relative;
overflow:hidden;
}

/* 右上ロゴ */
.logo-box{
position:absolute;
top:20px;
right:20px;
background:#fff;
padding:10px 16px;
border-radius:8px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:10;
}

.logo-box img{
height:80px;
display:block;
}

/* 中央ロゴ */
.hero-center-logo{
background:#fff;
display:inline-block;
padding:15px 25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
margin:20px 0;
}

.hero-center-logo img{
height:60px;
display:block;
margin:auto;
}

.hero:after{
content:"";
position:absolute;
bottom:-1px;
left:0;
width:100%;
height:80px;
background:#fff;
clip-path:polygon(0 0,100% 100%,0 100%);
}

.hero h1{
font-size:36px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
opacity:.95;
}

/* ===== 0円強調バッジ ===== */
.zero-fee{
display:inline-block;
background:#ff9800;
color:#fff;
font-size:18px;
font-weight:bold;
padding:14px 28px;
border-radius:999px;
margin-top:20px;
box-shadow:0 8px 20px rgba(255,0,0,.25);
letter-spacing:.05em;
}

/* 0円強調 */
.zero-fee .big-zero{
font-size:32px;
display:block;
margin-top:5px;
}

.zero-fee small{
display:block;
font-size:14px;
font-weight:normal;
opacity:.9;
margin-top:4px;
}

/* ===== section ===== */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.section-gray{
background:#f7f7f7;
}

.section-dark{
background:var(--cyan30);
color:#333;
text-align:center;
border-bottom:40px solid #fff;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:50px;
}

/* ===== grid ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* カード */
.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
text-align:center;
border:2px solid var(--cyan30);
font-weight:600;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 16px 30px rgba(0,0,0,.12);
border-color:var(--cyan100);
}

/* 矢印 */
.arrow-down{
text-align:center;
font-size:60px;
color:var(--cyan100);
margin:20px 0;
animation:arrowMove 1.2s infinite;
}

@keyframes arrowMove{
0%{transform:translateY(0);}
50%{transform:translateY(8px);}
100%{transform:translateY(0);}
}

/* ===== feature ===== */
.feature{
display:flex;
gap:20px;
margin-bottom:30px;
align-items:flex-start;
}

.feature-number{
background:var(--cyan100);
color:#fff;
font-weight:bold;
font-size:24px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.feature-text h3{
margin:0 0 10px;
}

/* CTA */
.big-cta{
background:#FFA726;
color:#fff;
padding:20px 60px;
font-size:20px;
font-weight:bold;
border-radius:8px;
display:inline-block;
text-decoration:none;
margin-top:20px;
box-shadow:0 8px 20px rgba(255,167,38,.3);
}

/* ===== footer ===== */
footer{
background:#fff;
color:#555;
padding:50px 20px;
font-size:14px;
border-top:1px solid #eee;
}

/* =========================
   📱 スマホ最適化
========================= */
@media (max-width: 768px){

  /* ロゴ中央 */
  .logo-box{
    right:50%;
    top:12px;
    transform:translateX(50%);
    padding:8px 12px;
  }

  .logo-box img{
    height:55px;
  }

  .hero{
    padding-top:140px;
  }

  .hero h1{
    font-size:26px;
  }

  .hero p{
    font-size:16px;
  }

  .hero-center-logo img{
    height:50px;
  }

  /* 0円さらに強調 */
  .zero-fee .big-zero{
    font-size:40px;
  }

  /* 見出し1行固定 */
  .title{
    white-space:nowrap;
    font-size:22px;
  }

}
</style>

</head>

<body>

<section class="hero">

<div class="logo-box">
<img src="【PNG】SEDIA渡辺パイプ_カラー.png" alt="ロゴ">
</div>

<h1>セディア・コネクト お問合せフォーム</h1>

<div class="hero-center-logo">
<img src="S_CONNECT_LOGO最終.png" alt="ロゴ">
</div>

<p>渡辺パイプ・セディアグループの施工店ネットワークで仕事の機会を創出</p>

<div class="zero-fee">
入会金・年会費・紹介手数料
<span class="big-zero">すべて0円</span>
<small>完全無料でご利用いただけます</small>
</div>

</section>

<section class="section">
<h2 class="title">こんなお悩みありませんか？</h2>

<div class="grid">
<div class="card">施工店が見つからない</div>
<div class="card">案件が回らない</div>
<div class="card">新規取引先を増やしたい</div>
<div class="card">遠方現場に対応したい</div>
</div>

<div class="arrow-down">↓</div>

<div style="text-align:center;margin-top:10px;">
<a href="#" class="big-cta">無料で問合せ</a>
</div>

</section>

</body>
</html>
