<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セディア・コネクト</title>

<style>
body{
margin:0;
font-family: "Helvetica Neue", Arial, sans-serif;
color:#333;
}

/* ===== メインカラー ===== */
:root{
--cyan100:#00AEEF;
--cyan70:#6FD3F7;
--cyan30:#E6F7FD;
}

/* ===== HERO ===== */
.hero{
background:linear-gradient(135deg,var(--cyan70),var(--cyan100));
color:#fff;
padding:100px 20px 140px;
text-align:center;
position:relative;
overflow:hidden;
}

/* 右上ロゴ */
.logo-box{
position:absolute;
top:20px;
right:20px;
background:#fff;
padding:10px 16px;
border-radius:8px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
z-index:10;
}

.logo-box img{
height:40px;
display:block;
}

/* 中央ロゴ */
.hero-center-logo{
background:#fff;
display:inline-block;
padding:15px 25px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,.15);
margin:20px 0;
}

.hero-center-logo img{
height:60px;
display:block;
margin:auto;
}

.hero:after{
content:"";
position:absolute;
bottom:-1px;
left:0;
width:100%;
height:80px;
background:#fff;
clip-path:polygon(0 0,100% 100%,0 100%);
}

.hero h1{
font-size:36px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
opacity:.95;
}

/* ===== section ===== */
.section{
padding:80px 20px;
max-width:1100px;
margin:auto;
}

.section-gray{
background:#f7f7f7;
}

.section-dark{
background:var(--cyan30);
color:#333;
text-align:center;
border-bottom:40px solid #fff;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:50px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 24px rgba(0,0,0,.08);
text-align:center;
border:2px solid var(--cyan30);
font-weight:600;
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 16px 30px rgba(0,0,0,.12);
border-color:var(--cyan100);
}

/* 矢印 */
.arrow-down{
text-align:center;
font-size:60px;
color:var(--cyan100);
margin:20px 0;
animation:arrowMove 1.2s infinite;
}

@keyframes arrowMove{
0%{transform:translateY(0);}
50%{transform:translateY(8px);}
100%{transform:translateY(0);}
}

.feature{
display:flex;
gap:20px;
margin-bottom:30px;
align-items:flex-start;
}

.feature-number{
background:var(--cyan100);
color:#fff;
font-weight:bold;
font-size:24px;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
}

.feature-text h3{
margin:0 0 10px;
}

.big-cta{
background:var(--cyan100);
color:#fff;
padding:20px 60px;
font-size:20px;
font-weight:bold;
border-radius:8px;
display:inline-block;
text-decoration:none;
margin-top:20px;
box-shadow:0 8px 20px rgba(0,174,239,.3);
}

footer{
background:#fff;
color:#555;
padding:50px 20px;
font-size:14px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<section class="hero">

<div class="logo-box">
<img src="S_CONNECT_LOGO最終.png" alt="ロゴ">
</div>

<h1>セディア・コネクト お問合せフォーム</h1>

<!-- ここに移動 -->
<div class="hero-center-logo">
<img src="S_CONNECT_LOGO最終.png" alt="ロゴ">
</div>

<p>渡辺パイプ・セディアグループの施工店ネットワークで仕事の機会を創出</p>

</section>

<section class="section">
<h2 class="title">こんなお悩みありませんか？</h2>

<div class="grid">
<div class="card">施工店が見つからない</div>
<div class="card">案件が回らない</div>
<div class="card">新規取引先を増やしたい</div>
<div class="card">遠方現場に対応したい</div>
</div>

<div class="arrow-down">↓</div>

<div style="text-align:center;margin-top:10px;">
<a href="https://tayori.com/form/db2fe61b8a4609596ab7565050b131445c765f00/" 
class="big-cta">
無料で問合せ
</a>
</div>

</section>
